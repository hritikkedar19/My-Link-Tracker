<!DOCTYPE html>
<html>

<head>

<title>Smart Link Tracker</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div id="loginBox" class="login-card">

<h2>Admin Login</h2>

<input id="user" placeholder="Username">
<input id="pass" placeholder="Password" type="password">

<button class="primary" onclick="login()">
Login
</button>

</div>



<div id="dashboard" style="display:none" class="container">

<h1>Smart Link Tracker</h1>


<div class="card">

<h2>Create Link</h2>

<input id="url" placeholder="Enter URL">

<input id="title" placeholder="Title">

<input id="custom" placeholder="Custom name (optional)">

<label>Expiry date</label>

<input id="expiry" type="date">

<button class="primary" onclick="shorten()">

Generate Link

</button>

</div>


<div id="responseBox"></div>


<div class="card">

<h2>Analytics</h2>

<canvas id="chart"></canvas>

</div>


<div class="card">

<h2>All Links</h2>

<button class="refresh-btn" onclick="loadStats()">
Refresh
</button>

<button class="primary" onclick="downloadCSV()">
Export CSV
</button>

<div id="links" class="grid"></div>

</div>


</div>


<script src="script.js"></script>

</body>

</html>
